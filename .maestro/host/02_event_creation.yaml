appId: com.example.spareseat
---
- launchApp:
    clearState: true
- tapOn: "Get Started"
- tapOn: "Phone"
- tapOn:
    id: "tilEmail"
- inputText: "4505140000"
- hideKeyboard
- tapOn:
    id: "tilPassword"
- inputText: "123456aA"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Host Dashboard"
    timeout: 15000
# Cleanup: remove leftover from any previous failed run before starting
- runFlow:
    when:
      visible: "Maestro Test Event"
    commands:
      - tapOn:
          text: "More options"
          rightOf: "Maestro Test Event"
      - tapOn: "Delete"
      - tapOn: "Delete"
- tapOn: "+ Create"
- assertVisible: "Title *"
- tapOn:
    id: "etTitle"
- inputText: "Maestro Test Event"
- hideKeyboard
- tapOn:
    id: "etDescription"
- inputText: "Created by automated test"
- hideKeyboard
- tapOn:
    id: "etDate"
- inputText: "2026-12-01"
- hideKeyboard
- tapOn:
    id: "etLocation"
- inputText: "Montreal"
- hideKeyboard
- tapOn:
    id: "etCategory"
- inputText: "Music"
- hideKeyboard
- tapOn:
    id: "etCapacity"
- inputText: "50"
- hideKeyboard
- tapOn: "Create"
- extendedWaitUntil:
    visible: "Maestro Test Event"
    timeout: 15000
- waitForAnimationToEnd
# Cleanup: delete the created event so host stays at 2 events
- tapOn:
    text: "More options"
    rightOf: "Maestro Test Event"
- tapOn: "Delete"
- assertVisible: "Delete Event"
- tapOn: "Delete"
- extendedWaitUntil:
    notVisible: "Maestro Test Event"
    timeout: 15000
