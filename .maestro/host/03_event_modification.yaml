appId: com.example.spareseat
---
- launchApp:
    clearState: true
- tapOn: "Get Started"
- tapOn: "Phone"
- tapOn:
    id: "tilEmail"
- inputText: "4505140000"
- hideKeyboard
- tapOn:
    id: "tilPassword"
- inputText: "123456aA"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Host Dashboard"
    timeout: 15000
# Cleanup: remove leftover from any previous failed run before starting
- runFlow:
    when:
      visible: "Event After Edit"
    commands:
      - tapOn:
          text: "More options"
          rightOf: "Event After Edit"
      - tapOn: "Delete"
      - tapOn: "Delete"
- runFlow:
    when:
      visible: "Event To Edit"
    commands:
      - tapOn:
          text: "More options"
          rightOf: "Event To Edit"
      - tapOn: "Delete"
      - tapOn: "Delete"
- tapOn: "+ Create"
- tapOn:
    id: "etTitle"
- inputText: "Event To Edit"
- hideKeyboard
- tapOn:
    id: "etDate"
- inputText: "2026-12-01"
- hideKeyboard
- tapOn:
    id: "etLocation"
- inputText: "Montreal"
- hideKeyboard
- tapOn:
    id: "etCapacity"
- inputText: "20"
- hideKeyboard
- tapOn: "Create"
- extendedWaitUntil:
    visible: "Event To Edit"
    timeout: 15000
- waitForAnimationToEnd
- tapOn:
    text: "More options"
    rightOf: "Event To Edit"
- tapOn: "Edit"
- assertVisible: "Title *"
- tapOn:
    id: "etTitle"
- eraseText: 50
- inputText: "Event After Edit"
- hideKeyboard
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Event After Edit"
    timeout: 15000
- waitForAnimationToEnd
# Cleanup: delete the modified event so host stays at 2 events
- tapOn:
    text: "More options"
    rightOf: "Event After Edit"
- tapOn: "Delete"
- assertVisible: "Delete Event"
- tapOn: "Delete"
- extendedWaitUntil:
    notVisible: "Event After Edit"
    timeout: 15000
