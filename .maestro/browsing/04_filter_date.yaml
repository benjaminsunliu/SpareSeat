appId: com.example.spareseat
---
# "This Month" matches: Good Vibes Downtown, Cancel Test, An event, Clash Royale Tournament (all April 2026)
- launchApp:
    clearState: true
- tapOn: "Get Started"
- tapOn:
    id: "tilEmail"
- inputText: "bigydot@gmail.com"
- hideKeyboard
- tapOn:
    id: "tilPassword"
- inputText: "123456aA"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Hi, Big Dot!"
    timeout: 15000
- extendedWaitUntil:
    visible: "View Details →"
    timeout: 15000
- tapOn:
    id: "actvDate"
- tapOn: "This Month"
- assertVisible: "Clash Royale Tournament"
