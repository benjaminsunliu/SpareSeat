appId: com.example.spareseat
---
# Self-contained: reserves a spot then cancels it.
- launchApp:
    clearState: true
- tapOn: "Get Started"
- tapOn:
    id: "tilEmail"
- inputText: "bigydot@gmail.com"
- hideKeyboard
- tapOn:
    id: "tilPassword"
- inputText: "123456aA"
- hideKeyboard
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Hi, Big Dot!"
    timeout: 15000
- extendedWaitUntil:
    visible: "View Details →"
    timeout: 15000
- tapOn:
    id: "etSearch"
- inputText: "Clash Royale"
- hideKeyboard
- assertVisible: "Clash Royale Tournament"
- tapOn: "View Details →"
- extendedWaitUntil:
    visible: "Event Details"
    timeout: 10000
- tapOn:
    id: "etQuantity"
- eraseText: 10
- inputText: "1"
- hideKeyboard
- tapOn: "Sign Up For Event"
- tapOn:
    id: "btnBack"
- tapOn: "My Reservations"
- extendedWaitUntil:
    visible: "My Reservations"
    timeout: 10000
- extendedWaitUntil:
    visible: "Cancel Reservation"
    timeout: 15000
- tapOn: "Cancel Reservation"
- assertVisible: "Cancel reservation?"
- tapOn: "Cancel reservation"
- extendedWaitUntil:
    notVisible: "Cancel reservation?"
    timeout: 10000
